<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corp-dle | Cyber Glass Leaderboard</title>
    <style>
        :root {
            --bg-dark: #0b0813;
            --glass-bg: rgba(23, 19, 44, 0.55);
            --glass-border: rgba(168, 85, 247, 0.25);
            --text-light: #ffffff;
            --neon-purple: #a855f7;
            --neon-cyan: #06b6d4;
            --color-correct: linear-gradient(180deg, rgba(34, 197, 94, 0.35) 0%, rgba(22, 163, 74, 0.55) 100%);
            --color-close: linear-gradient(180deg, rgba(234, 179, 8, 0.35) 0%, rgba(202, 138, 4, 0.55) 100%);
            --color-wrong: rgba(255, 255, 255, 0.04);
            --blur-value: 16px;
            --shadow-subtle: 0 12px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(168, 85, 247, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, rgba(6, 182, 212, 0.12) 0%, transparent 50%);
            background-size: 150% 150%;
            background-attachment: fixed;
            color: var(--text-light);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            animation: ambient-glow 16s ease infinite;
        }

        @keyframes ambient-glow {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 950px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-value));
            -webkit-backdrop-filter: blur(var(--blur-value));
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 16px 28px;
            box-shadow: var(--shadow-subtle);
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        header h1 {
            margin: 0;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            margin: 4px 0 0 0;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .score-board { display: flex; gap: 20px; }
        .score-box { text-align: center; font-size: 0.7rem; font-weight: 700; color: rgba(255, 255, 255, 0.4); }
        .score-value { font-size: 1.4rem; font-weight: 800; color: #ffffff; text-shadow: 0 0 10px rgba(6, 182, 212, 0.3); }

        .loading-status {
            color: var(--neon-cyan);
            font-weight: 600;
            margin-bottom: 20px;
            font-size: 0.8rem;
            background: rgba(6, 182, 212, 0.08);
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid rgba(6, 182, 212, 0.2);
            animation: pulse-status 2.5s infinite ease-in-out;
        }

        @keyframes pulse-status {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* Main Grid: Game Left, Leaderboard Right */
        .main-layout {
            display: flex;
            width: 100%;
            max-width: 950px;
            gap: 30px;
            align-items: flex-start;
        }

        .game-container {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 30px;
            min-width: 0;
        }

        /* Leaderboard Container */
        .leaderboard-container {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-value));
            -webkit-backdrop-filter: blur(var(--blur-value));
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow-subtle);
            box-sizing: border-box;
            min-width: 280px;
        }

        .leaderboard-title {
            margin: 0 0 15px 0;
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--neon-cyan);
        }

        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .leaderboard-name { font-weight: 600; }
        .leaderboard-score { font-weight: 800; color: var(--neon-cyan); }

        /* Hint Box */
        .hint-container {
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-value));
            -webkit-backdrop-filter: blur(var(--blur-value));
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            box-sizing: border-box;
            box-shadow: var(--shadow-subtle);
        }
        
        .hint-title { margin: 0 0 20px 0; font-size: 0.95rem; font-weight: 700; text-transform: uppercase; color: rgba(255, 255, 255, 0.7); }
        .hint-grid { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 15px; }
        .hint-box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.06); padding: 14px; border-radius: 16px; min-width: 100px; text-align: center; flex: 1; }
        .hint-label { font-size: 0.72rem; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; font-weight: 700; margin-bottom: 6px; }
        .hint-value { font-size: 1.1rem; font-weight: 700; }

        /* Inputs & Buttons */
        .input-section { display: flex; gap: 15px; justify-content: center; }
        .search-container { position: relative; width: 100%; }
        input[type="text"] { width: 100%; padding: 16px 24px; font-size: 1rem; background: rgba(255, 255, 255, 0.05); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 16px; box-sizing: border-box; outline: none; transition: all 0.4s; }
        input[type="text"]:focus { background: rgba(255, 255, 255, 0.08); border-color: var(--neon-cyan); box-shadow: 0 0 25px rgba(6, 182, 212, 0.25); }

        .suggestions-list { position: absolute; top: 115%; left: 0; width: 100%; background: rgba(15, 12, 27, 0.9); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 16px; max-height: 240px; overflow-y: auto; z-index: 10; display: none; }
        .suggestions-list div { padding: 14px 24px; cursor: pointer; color: rgba(255,255,255,0.7); transition: all 0.2s; }
        .suggestions-list div:hover { background: rgba(168, 85, 247, 0.2); color: #ffffff; padding-left: 32px; }

        button { padding: 16px 36px; font-size: 1rem; font-weight: 700; background: linear-gradient(180deg, rgba(168, 85, 247, 0.4) 0%, rgba(168, 85, 247, 0.15) 100%); color: white; border: 1px solid var(--neon-purple); border-radius: 16px; cursor: pointer; box-shadow: 0 6px 20px rgba(168, 85, 247, 0.15); transition: all 0.4s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(168, 85, 247, 0.25); }

        /* Table Content */
        .table-container { display: none; overflow-x: auto; width: 100%; background: var(--glass-bg); backdrop-filter: blur(var(--blur-value)); border: 1px solid var(--glass-border); border-radius: 24px; padding: 12px; box-shadow: var(--shadow-subtle); animation: revealContainer 0.5s forwards; }
        @keyframes revealContainer { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        table { width: 100%; border-collapse: separate; border-spacing: 8px; }
        th { color: rgba(255, 255, 255, 0.4); font-weight: 600; padding: 10px; text-align: center; font-size: 0.8rem; text-transform: uppercase; }
        
        tr.new-row { animation: slideUp 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        td { padding: 16px 12px; text-align: center; font-weight: 600; border-radius: 14px; font-size: 0.95rem; color: white; border: 1px solid rgba(255,255,255,0.05); }
        .correct { background: var(--color-correct); border-color: rgba(34, 197, 94, 0.3); }
        .close { background: var(--color-close); border-color: rgba(234, 179, 8, 0.3); }
        .wrong { background: var(--color-wrong); color: rgba(255, 255, 255, 0.4); }
        .company-name { background: rgba(255, 255, 255, 0.03); text-align: left; padding-left: 20px; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(11, 8, 19, 0.6); backdrop-filter: blur(15px); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: rgba(23, 19, 44, 0.8); border: 1px solid var(--glass-border); padding: 40px; border-radius: 28px; text-align: center; max-width: 420px; width: 90%; animation: modalZoom 0.4s forwards; }
        @keyframes modalZoom { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
        .modal-content h2 { margin-top: 0; font-size: 2.2rem; font-weight: 800; }
        .modal-content p { color: rgba(255, 255, 255, 0.6); margin-bottom: 25px;}
        
        /* Highscore Entry im Modal */
        .highscore-entry { display: none; margin-bottom: 20px; flex-direction: column; gap: 10px; }
        .highscore-entry input { width: 100%; padding: 12px; border-radius: 10px; background: rgba(0,0,0,0.3); border: 1px solid var(--neon-cyan); color: white; text-align: center; font-weight: bold; box-sizing: border-box; outline: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <header>
            <h1>CORP-DLE</h1>
            <p class="subtitle">Cyber-Analytics Division</p>
        </header>
        
        <div class="score-board">
            <div class="score-box"><div>STREAK</div><div id="current-streak" class="score-value">0</div></div>
            <div class="score-box"><div>BEST</div><div id="best-streak" class="score-value">0</div></div>
        </div>
    </div>

    <div id="loader" class="loading-status">Matrix wird initialisiert...</div>

    <div class="main-layout">
        <div class="game-container">
            <div class="hint-container">
                <div class="hint-title">🎯 Daten-Target</div>
                <div class="hint-grid">
                    <div class="hint-box"><div class="hint-label">Herkunft</div><div class="hint-value" id="target-country">-</div></div>
                    <div class="hint-box"><div class="hint-label">Sektor</div><div class="hint-value" id="target-sector">-</div></div>
                    <div class="hint-box"><div class="hint-label">Umsatz</div><div class="hint-value" id="target-revenue">-</div></div>
                    <div class="hint-box"><div class="hint-label">Marge</div><div class="hint-value" id="target-margin">-</div></div>
                    <div class="hint-box"><div class="hint-label">Gewinn</div><div class="hint-value" id="target-net">-</div></div>
                </div>
            </div>

            <div class="input-section" id="action-area">
                <div class="search-container">
                    <input type="text" id="company-input" placeholder="Konzern wählen..." oninput="showSuggestions()" autocomplete="off">
                    <div id="suggestions" class="suggestions-list"></div>
                </div>
                <button id="guess-btn" onclick="makeGuess()">Tippen</button>
            </div>

            <div class="table-container" id="table-wrapper">
                <table id="results-table">
                    <thead>
                        <tr>
                            <th style="text-align: left; padding-left: 20px;">Unternehmen</th>
                            <th>Land</th>
                            <th>Sektor</th>
                            <th>Umsatz</th>
                            <th>Bruttomarge</th>
                            <th>Gewinn</th>
                        </tr>
                    </thead>
                    <tbody id="results-body"></tbody>
                </table>
            </div>
        </div>

        <div class="leaderboard-container">
            <div class="leaderboard-title">🏆 Global Mainframe</div>
            <div class="leaderboard-list" id="leaderboard-board">
                <div class="leaderboard-item">Keine Einträge vorhanden.</div>
            </div>
        </div>
    </div>

    <div id="game-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Ergebnis</h2>
            <p id="modal-message"></p>
            
            <div class="highscore-entry" id="leaderboard-input-zone">
                <p style="font-size: 0.85rem; color: var(--neon-cyan)">Neuer Highscore! Trage dein Agenten-Kürzel ein:</p>
                <input type="text" id="player-tag" placeholder="ANONYMOUS" maxlength="12">
                <button onclick="submitGlobalScore()" style="padding: 10px; background: var(--neon-cyan); border-color: var(--neon-cyan); margin-top: 5px;">Daten einspeisen</button>
            </div>

            <button id="next-round-btn" onclick="resetGame()">Nächste Runde →</button>
        </div>
    </div>

    <script src="companies.js"></script>

    <script>
        let targetCompany;
        let guessedCompanies = [];
        let selectedCompanyId = "";
        const maxAttempts = 6;

        let streak = parseInt(localStorage.getItem("corpdle_streak")) || 0;
        let highscore = parseInt(localStorage.getItem("corpdle_highscore")) || 0;
        
        // Holt die Bestenliste jetzt SICHER lokal aus dem Speicher des Browsers
        let globalScores = JSON.parse(localStorage.getItem("corpdle_leaderboard_list")) || [];

        const stageColors = [
            { purple: "#a855f7", cyan: "#06b6d4" },
            { purple: "#bd55f7", cyan: "#06d4b2" },
            { purple: "#f43f5e", cyan: "#fb923c" },
            { purple: "#e11d48", cyan: "#f97316" },
            { purple: "#dc2626", cyan: "#22c55e" },
            { purple: "#991b1b", cyan: "#15803d" }
        ];

        function updateScoreDisplay() {
            document.getElementById("current-streak").textContent = streak;
            document.getElementById("best-streak").textContent = highscore;
        }

        function applyColors(attemptIndex) {
            const index = Math.min(attemptIndex, stageColors.length - 1);
            const theme = stageColors[index];
            document.documentElement.style.setProperty('--neon-purple', theme.purple);
            document.documentElement.style.setProperty('--neon-cyan', theme.cyan);
            document.documentElement.style.setProperty('--glass-border', `${theme.purple}40`);
        }

        function renderLeaderboard() {
            const board = document.getElementById("leaderboard-board");
            board.innerHTML = "";
            
            // Sortiert nach höchstem Score
            const sorted = globalScores.sort((a, b) => b.score - a.score).slice(0, 5);

            if(sorted.length === 0) {
                board.innerHTML = "<div class='leaderboard-item'>Keine Einträge vorhanden.</div>";
                return;
            }

            sorted.forEach((entry, i) => {
                const medals = ["🥇", "🥈", "🥉", "🤖", "📟"];
                const prefix = medals[i] || "#" + (i + 1);
                board.innerHTML += `
                    <div class="leaderboard-item">
                        <span class="leaderboard-name">${prefix} ${entry.name}</span>
                        <span class="leaderboard-score">${entry.score} Runden</span>
                    </div>
                `;
            });
        }

        function submitGlobalScore() {
            const nameInput = document.getElementById("player-tag").value.trim() || "ANON_AGENT";
            const currentRoundScore = parseInt(document.getElementById("leaderboard-input-zone").dataset.score) || 0;
            
            // Suchen, ob der Name schon existiert
            const existingUserIndex = globalScores.findIndex(u => u.name.toLowerCase() === nameInput.toLowerCase());
            
            if (existingUserIndex !== -1) {
                // Wenn der neue Score besser ist als der alte Eintrag, überschreiben
                if(currentRoundScore > globalScores[existingUserIndex].score) {
                    globalScores[existingUserIndex].score = currentRoundScore;
                }
            } else {
                globalScores.push({ name: nameInput, score: currentRoundScore });
            }

            // Sicher im Browser speichern
            localStorage.setItem("corpdle_leaderboard_list", JSON.stringify(globalScores));

            document.getElementById("leaderboard-input-zone").style.display = "none";
            document.getElementById("loader").textContent = "⚡ System operativ • Speicher aktualisiert";
            
            renderLeaderboard();
        }

        function initGame() {
            targetCompany = companiesData[Math.floor(Math.random() * companiesData.length)];
            guessedCompanies = [];
            selectedCompanyId = "";
            
            updateScoreDisplay();
            applyColors(0);
            renderLeaderboard();

            document.getElementById("target-country").textContent = targetCompany.country;
            document.getElementById("target-sector").textContent = targetCompany.sector;
            document.getElementById("target-revenue").textContent = `$${targetCompany.revenue}B`;
            document.getElementById("target-margin").textContent = `${targetCompany.margin}%`;
            document.getElementById("target-net").textContent = `$${targetCompany.netIncome}B`;

            document.getElementById("company-input").value = "";
            document.getElementById("company-input").disabled = false;
            document.getElementById("guess-btn").disabled = false;
            document.getElementById("results-body").innerHTML = "";
            document.getElementById("game-modal").style.display = "none";
            document.getElementById("action-area").style.display = "flex";
            document.getElementById("table-wrapper").style.display = "none";
            document.getElementById("leaderboard-input-zone").style.display = "none";
            document.getElementById("next-round-btn").style.display = "inline-block";
        }

        function showSuggestions() {
            const input = document.getElementById("company-input").value.toLowerCase();
            const suggestionsContainer = document.getElementById("suggestions");
            suggestionsContainer.innerHTML = "";
            
            if (!input) { suggestionsContainer.style.display = "none"; return; }

            const filtered = companiesData.filter(c => c.name.toLowerCase().includes(input) && !guessedCompanies.includes(c.id));
            if (filtered.length === 0) { suggestionsContainer.style.display = "none"; return; }

            filtered.forEach(comp => {
                const div = document.createElement("div");
                div.textContent = comp.name;
                div.onclick = () => {
                    document.getElementById("company-input").value = comp.name;
                    selectedCompanyId = comp.id;
                    suggestionsContainer.style.display = "none";
                };
                suggestionsContainer.appendChild(div);
            });
            suggestionsContainer.style.display = "block";
        }

        document.addEventListener("click", function (e) {
            if (e.target.id !== "company-input") { document.getElementById("suggestions").style.display = "none"; }
        });

        function getFeedbackClass(guessVal, targetVal) {
            if (guessVal === targetVal) return { class: "correct", icon: "" };
            const denominator = targetVal === 0 ? 1 : Math.abs(targetVal);
            const deviation = Math.abs(guessVal - targetVal) / denominator;
            const direction = guessVal < targetVal ? " ⬆️" : " ⬇️";
            return deviation <= 0.20 ? { class: "close", icon: direction } : { class: "wrong", icon: direction };
        }

        function makeGuess() {
            const inputField = document.getElementById("company-input");
            
            if (!selectedCompanyId) {
                const exactMatch = companiesData.find(c => c.name.toLowerCase() === inputField.value.toLowerCase());
                if (exactMatch) selectedCompanyId = exactMatch.id;
            }

            if (!selectedCompanyId || guessedCompanies.includes(selectedCompanyId)) {
                alert("Wähle ein Unternehmen aus der Dropdown-Liste!");
                return;
            }

            if (guessedCompanies.length === 0) { document.getElementById("table-wrapper").style.display = "block"; }

            guessedCompanies.push(selectedCompanyId);
            applyColors(guessedCompanies.length);

            const guess = companiesData.find(c => c.id === selectedCompanyId);
            inputField.value = "";
            const currentGuessId = selectedCompanyId;
            selectedCompanyId = ""; 

            const tbody = document.getElementById("results-body");
            const row = document.createElement("tr");
            row.className = "new-row";

            // Spalten befüllen
            const tdName = document.createElement("td"); tdName.className = "company-name"; tdName.textContent = guess.name; row.appendChild(tdName);
            const tdCountry = document.createElement("td"); tdCountry.textContent = guess.country; tdCountry.className = guess.country === targetCompany.country ? "correct" : "wrong"; row.appendChild(tdCountry);
            const tdSector = document.createElement("td"); tdSector.textContent = guess.sector; tdSector.className = guess.sector === targetCompany.sector ? "correct" : "wrong"; row.appendChild(tdSector);
            
            const tdRev = document.createElement("td"); const revFeed = getFeedbackClass(guess.revenue, targetCompany.revenue); tdRev.textContent = `$${guess.revenue}B${revFeed.icon}`; tdRev.className = revFeed.class; row.appendChild(tdRev);
            const tdMargin = document.createElement("td"); const marginFeed = getFeedbackClass(guess.margin, targetCompany.margin); tdMargin.textContent = `${guess.margin}%${marginFeed.icon}`; tdMargin.className = marginFeed.class; row.appendChild(tdMargin);
            const tdNet = document.createElement("td"); const netFeed = getFeedbackClass(guess.netIncome, targetCompany.netIncome); tdNet.textContent = `$${guess.netIncome}B${netFeed.icon}`; tdNet.className = netFeed.class; row.appendChild(tdNet);

            tbody.insertBefore(row, tbody.firstChild);

            if (currentGuessId === targetCompany.id) {
                streak++;
                if (streak > highscore) {
                    highscore = streak;
                    localStorage.setItem("corpdle_highscore", highscore);
                }
                localStorage.setItem("corpdle_streak", streak);
                endGame(true);
            } else if (guessedCompanies.length >= maxAttempts) {
                const finalCheckScore = streak; 
                streak = 0;
                localStorage.setItem("corpdle_streak", streak);
                endGame(false, finalCheckScore);
            }
        }

        function endGame(won, scoreAtDefeat = 0) {
            document.getElementById("company-input").disabled = true;
            document.getElementById("guess-btn").disabled = true;
            updateScoreDisplay();
            
            const modal = document.getElementById("game-modal");
            document.getElementById("modal-title").textContent = won ? "ANALYSE ERFOLGREICH ✨" : "VERBINDUNG ABGEBROCHEN 💀";
            document.getElementById("modal-message").textContent = won 
                ? `Zielobjekt ${targetCompany.name} lokalisiert.` 
                : `Fehlgeschlagen. Die Daten stammten von: ${targetCompany.name}.`;
            
            const scoreToRegister = won ? streak : scoreAtDefeat;
            if (scoreToRegister > 0) {
                const inputZone = document.getElementById("leaderboard-input-zone");
                inputZone.style.display = "flex";
                inputZone.dataset.score = scoreToRegister; // Merkt sich den Score für das Eintragen
            }
            
            setTimeout(() => { modal.style.display = "flex"; }, 600);
        }

        function resetGame() { initGame(); }

        window.onload = function() {
            initGame();
            document.getElementById("loader").textContent = "⚡ Cyber-Glass Engine stabil (Offline-Modus)";
        };
    </script>
</body>
</html>
